<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/c2aeb8e94c.js" crossorigin="anonymous"></script>
</head>

<body style="height:120vh;">
    <nav>
        <div class="logo"><a href="index.html">
                <h1>TruthLens</h1>
            </a></div>
        <div class="links">
            <a href="check.html">Check Now</a>
            <a href="analysis.html">Analyse</a>
            <a href="statistics.html">Statistics</a>
        </div>
    </nav>

    <div class="checkasource">
        <h1>Check a Source</h1>
        <div class="inputs">
            <input type="text" placeholder="Paste a headline/link...">
            <a href="analysis.html" style="text-decoration: none;"> <button>Analyse</button></a>
        </div>
        <h4 style="text-align: center; margin-block: 30px;">or...</h4>
        <!-- upload a file button -->
        <div class="inputs">
            <input type="file" id="fileInput" style="display: none;">
            <button type="button" onclick="document.getElementById('fileInput').click();">Upload a File</button>
        </div>

        <!-- show a text preview of the file -->
        <div id="filePreview"
            style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; display: none; align-items: center; justify-content: space-between; border-radius: 5px; background: var(--darkoverlay);">
            <!-- file preview will be shown here -->
        </div>
        <div class="infoandgemini">
            <h2
                style="font-family: Agrandir; text-align:left;font-weight:400;color:white;-webkit-background-clip:none;">
                Paste anything to fact-check</h2>
            <p style="text-align:left; margin-block:10px;">WhatsApp forwards, news headlines, viral claims — TruthLens
                checks them all against live web sources using Gemini AI.</p>

            <div class="inputs" style="justify-content:left">
                <input type="text" placeholder="Enter Gemini API key...">
                <button>Verify</button>
            </div>
        </div>
        <script>
            const fileInput = document.getElementById('fileInput');
            const filePreview = document.getElementById('filePreview');

            fileInput.addEventListener('change', () => {
                const file = fileInput.files[0];
                if (!file) {
                    filePreview.style.display = 'none';
                    filePreview.textContent = '';
                    return;
                }

                filePreview.innerHTML = `<span>Uploaded: ${file.name}</span><button type="button" id="removeFileBtn" style="background: none; border: none; font-size: 18px; cursor: pointer;">❌</button>`;
                filePreview.style.display = 'flex';

                document.getElementById('removeFileBtn').addEventListener('click', () => {
                    fileInput.value = '';
                    filePreview.style.display = 'none';
                    filePreview.textContent = '';
                });
            });
        </script>
    </div>
</body>
<style>
    /* remove vertical scrolling */
    body {
        overflow-y: hidden;
    }

    .infoandgemini {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: calc(100% - 40px);
        max-width: 90%;
        display: flex;
        flex-direction: column;
        text-align: left;
        align-items: flex-start;
        justify-content: left;
    }
</style>

</html>
