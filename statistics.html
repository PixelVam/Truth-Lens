<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/c2aeb8e94c.js" crossorigin="anonymous"></script>
</head>

<body>
    <nav>
        <div class="logo"><a href="index.html">
                <h1>TruthLens</h1>
            </a></div>
        <div class="links">
            <a href="check.html">Check Now</a>
            <a href="analysis.html">Analyse</a>
            <a href="statistics.html">Statistics</a>
        </div>
    </nav>

    <main style="margin-top: 150px;">
        <h1>Statistics</h1>
        <div class="numericals">

            <div class="card">
                <i class="fa-solid fa-magnifying-glass"></i>
                <h5>Total Checks</h5>
                <p class="totalchecks">12</p>
            </div>
            <div class="card">
                <i class="fa-regular fa-circle-check"></i>
                <h5>True Checks</h5>
                <p class="truechecks">7</p>
            </div>
            <div class="card">
                <i class="fa-regular fa-circle-xmark"></i>
                <h5>False Checks</h5>
                <p class="falsechecks">5</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-percent"></i>
                <h5>Accuracy Ratio</h5>
                <p class="accuracyratio">58%</p>
            </div>

        </div>
        <h4 style="padding: 20px;">Verdict Distribution</h4>
        <div class="verdictdistgraph" style="
        width: 100%;
        padding: 20px;">GRAPH GOES HERE</div>
    </main>
</body>

</html>
